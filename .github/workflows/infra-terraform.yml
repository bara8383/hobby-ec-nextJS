name: Terraform Infra

on:
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/infra-terraform.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/infra-terraform.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_IN_AUTOMATION: true
  TF_STATE_KEY: ${{ vars.TF_STATE_KEY != '' && vars.TF_STATE_KEY || 'infra/terraform/prod.tfstate' }}

jobs:
  plan:
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-plan-${{ github.ref }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Render Terraform variables
        run: |
          cat > terraform.auto.tfvars.json <<EOF
          {
            "aws_region": "${{ vars.AWS_REGION }}",
            "project_name": "${{ vars.TF_PROJECT_NAME }}",
            "env": "${{ vars.TF_ENV }}",
            "instance_type": "${{ vars.TF_INSTANCE_TYPE }}",
            "container_port": ${{ vars.TF_CONTAINER_PORT }},
            "public_ingress_cidrs": ${{ vars.TF_PUBLIC_INGRESS_CIDRS }},
            "ssm_parameters": ${{ vars.TF_SSM_PARAMETERS_JSON }},
            "secrets_manager_values": ${{ secrets.TF_SECRETS_MANAGER_VALUES_JSON }}
          }
          EOF

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        shell: bash
        run: |
          set -o pipefail
          terraform plan -no-color -input=false 2>&1 | tee terraform-plan.txt

      - name: Add Terraform plan to job summary
        if: always()
        run: |
          {
            echo "## Terraform plan"
            echo
            echo '```'
            if [ -f terraform-plan.txt ]; then
              sed -n '1,500p' terraform-plan.txt
            else
              echo "Terraform plan output was not generated."
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment Terraform plan on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- terraform-plan-comment -->";
            const planPath = "infra/terraform/terraform-plan.txt";
            const plan = fs.existsSync(planPath)
              ? fs.readFileSync(planPath, "utf8")
              : "Terraform plan output was not generated.";
            const maxLength = 60000;
            const clipped = plan.length > maxLength
              ? `${plan.slice(0, maxLength)}\n\n...truncated...`
              : plan;
            const body = [
              marker,
              "## Terraform plan",
              "",
              "```",
              clipped,
              "```",
            ].join("\n");
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const previous = comments.data.find((comment) =>
              comment.body?.includes(marker)
            );
            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  apply:
    if: github.event_name == 'workflow_dispatch'
    needs: plan
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: terraform-production
      cancel-in-progress: false
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Render Terraform variables
        run: |
          cat > terraform.auto.tfvars.json <<EOF
          {
            "aws_region": "${{ vars.AWS_REGION }}",
            "project_name": "${{ vars.TF_PROJECT_NAME }}",
            "env": "${{ vars.TF_ENV }}",
            "instance_type": "${{ vars.TF_INSTANCE_TYPE }}",
            "container_port": ${{ vars.TF_CONTAINER_PORT }},
            "public_ingress_cidrs": ${{ vars.TF_PUBLIC_INGRESS_CIDRS }},
            "ssm_parameters": ${{ vars.TF_SSM_PARAMETERS_JSON }},
            "secrets_manager_values": ${{ secrets.TF_SECRETS_MANAGER_VALUES_JSON }}
          }
          EOF

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Terraform apply
        run: terraform apply -auto-approve
